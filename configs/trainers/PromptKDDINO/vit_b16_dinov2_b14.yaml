DATALOADER:
  TRAIN_X:
    BATCH_SIZE: 8
  TEST:
    BATCH_SIZE: 100
  NUM_WORKERS: 8

INPUT:
  SIZE: (224, 224)
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.48145466, 0.4578275, 0.40821073]
  PIXEL_STD: [0.26862954, 0.26130258, 0.27577711]
  TRANSFORMS: ["random_resized_crop", "random_flip", "normalize"]

OPTIM:
  NAME: "sgd"
  LR: 0.005
  MAX_EPOCH: 20
  LR_SCHEDULER: "cosine"
  WARMUP_EPOCH: 1
  WARMUP_TYPE: "constant"
  WARMUP_CONS_LR: 1e-5

TRAIN:
  PRINT_FREQ: 20

MODEL:
  BACKBONE:
    NAME: "ViT-B/16"

TEST:
  FINAL_MODEL: "best_val"
  NO_TEST: False

TRAINER:
  NAME: PromptKDDINO
  MODAL: base2novel
  PROMPTKD_DINO:
    N_CTX_VISION: 4
    N_CTX_TEXT: 4
    CTX_INIT: "a photo of a"
    PREC: "fp16"
    PROMPT_DEPTH_VISION: 9
    PROMPT_DEPTH_TEXT: 9
    KD_WEIGHT: 1.0
    TEMPERATURE: 1.0
    CLIP_TEACHER_NAME: "ViT-L/14"
    USE_CLIP_TEACHER_CKPT: False
    DINO_MODEL_NAME: "dinov2_vitb14"
    DINO_CKPT: ""
    DINO_REPO_OR_DIR: ""
    DINO_FEATURE_DIM: 768
    DINO_WEIGHT: 2.0
    DINO_FEAT_WEIGHT: 1.0
    DINO_REL_WEIGHT: 0.5
    DINO_TEMPERATURE: 0.07
    DINO_WARMUP_EPOCH: 5
    DINO_USE_RELATIONAL_KD: True
